<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroPDF - Révision Intelligente</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f0c29;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --primary: #00f2fe;
            --secondary: #ff00e6;
            --success: #00e676;
            --text: #ffffff;
            --text-muted: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- UPLOAD SCREEN --- */
        #upload-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; background: var(--bg-gradient); transition: opacity 0.5s ease;
        }

        .drop-zone {
            width: 500px; height: 300px;
            border: 2px dashed var(--primary); border-radius: 20px;
            background: var(--glass); display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }
        .drop-zone:hover { transform: scale(1.05); background: rgba(0, 242, 254, 0.1); box-shadow: 0 10px 40px rgba(0, 242, 254, 0.2); }
        .drop-zone h2 { font-size: 24px; margin-bottom: 10px; }
        .drop-zone input { display: none; }
        
        .loader { display: none; margin-top: 20px; font-size: 18px; color: var(--primary); animation: pulse 1.5s infinite; }

        /* --- APP SCREEN --- */
        #app-screen { display: none; width: 100%; height: 100%; }

        .sidebar {
            width: 400px; padding: 30px; display: flex; flex-direction: column; gap: 20px;
            background: rgba(15, 12, 41, 0.8); backdrop-filter: blur(20px); border-right: 1px solid var(--border); z-index: 10;
        }

        .logo { font-size: 32px; font-weight: 700; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 10px;}

        .stat-card { background: var(--glass); border-radius: 16px; padding: 20px; border: 1px solid var(--border); transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); border-color: rgba(0, 242, 254, 0.3); }

        .stat-title { font-size: 12px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 500;}
        .stat-value { font-size: 36px; font-weight: 700; text-align: center; text-shadow: 0 0 20px rgba(0, 242, 254, 0.5); transition: color 0.3s; }
        .chart-container { position: relative; height: 160px; display: flex; justify-content: center; }

        .priority-list { list-style: none; overflow-y: auto; max-height: 250px; padding-right: 5px;}
        .priority-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid var(--border); font-size: 15px;
            background: rgba(0,0,0,0.3); margin-bottom: 8px; border-radius: 10px;
            transition: all 0.3s ease;
        }
        .priority-item:hover { background: rgba(0, 242, 254, 0.15); transform: translateX(5px); }
        .priority-item.learned { background: rgba(0, 230, 118, 0.1); border-left: 4px solid var(--success); opacity: 0.7; }
        
        .btn-check { background: var(--primary); color: #000; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.3s; }
        .btn-check:hover { background: #fff; box-shadow: 0 0 10px var(--primary); }

        .btn-glow {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff; font-weight: 700; font-size: 16px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 0 20px rgba(255, 0, 230, 0.4); margin-top: auto;
        }
        .btn-glow:hover { box-shadow: 0 0 30px rgba(255, 0, 230, 0.7); transform: translateY(-3px); }

        .main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; }
        .pdf-frame { flex: 1; width: 100%; border-radius: 16px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.6); background: #fff; }
        .pdf-frame iframe { width: 100%; height: 100%; border: none; }

        /* --- MODAL QUIZ --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); z-index: 100; justify-content: center; align-items: center; }
        .modal { background: var(--bg-gradient); padding: 40px; border-radius: 20px; width: 500px; border: 1px solid var(--primary); box-shadow: 0 0 40px rgba(0, 242, 254, 0.3); text-align: center; animation: slideUp 0.4s ease; }
        .modal h3 { font-size: 24px; margin-bottom: 20px; color: var(--primary); }
        .quiz-question { font-size: 18px; margin-bottom: 25px; line-height: 1.4; }
        .quiz-options { display: flex; flex-direction: column; gap: 10px; }
        .quiz-btn { padding: 15px; border: 1px solid var(--border); background: var(--glass); color: #fff; border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 16px; text-align: left;}
        .quiz-btn:hover { background: rgba(0, 242, 254, 0.2); border-color: var(--primary); }
        .quiz-btn.correct { background: rgba(0, 230, 118, 0.3); border-color: var(--success); }
        .quiz-btn.wrong { background: rgba(255, 0, 0, 0.3); border-color: red; }
        .close-modal { margin-top: 25px; padding: 10px 20px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: 0.3s;}
        .close-modal:hover { color: #fff; background: var(--glass); }

        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; text-shadow: 0 0 10px var(--primary); } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="upload-screen">
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <h2 id="drop-text">📂 Dépose ton PDF ici</h2>
            <p>ou clique pour parcourir</p>
            <input type="file" id="file-input" accept="application/pdf">
        </div>
        <div class="loader" id="loader">🧠 Analyse neuronale en cours...</div>
    </div>

    <div id="app-screen">
        <aside class="sidebar">
            <div class="logo">⚡ NeuroPDF</div>

            <div class="stat-card">
                <div class="stat-title">Maîtrise du Document</div>
                <div class="chart-container"><canvas id="progressChart"></canvas></div>
                <div class="stat-value" id="mastery-score" style="margin-top: -95px;">0%</div>
            </div>

            <div class="stat-card" style="flex:1; display:flex; flex-direction:column; margin-top: 70px;">
                <div class="stat-title">Concepts Clés Détectés</div>
                <ul class="priority-list" id="priority-list"></ul>
            </div>

            <button class="btn-glow" onclick="openQuiz()">🎯 Tester mes connaissances</button>
        </aside>

        <main class="main-content">
            <div class="pdf-frame"><iframe id="pdf-viewer"></iframe></div>
        </main>
    </div>

    <div class="modal-overlay" id="quiz-modal">
        <div class="modal">
            <h3>🧠 Entraînement Flash</h3>
            <div class="quiz-question" id="quiz-question">Chargement de la question...</div>
            <div class="quiz-options" id="quiz-options">
                </div>
            <button class="close-modal" onclick="closeQuiz()">Fermer</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let currentMastery = 0;
        let extractedKeywords = [];
        let progressChart;
        const stopWords = ["le","la","les","un","une","des","et","ou","est","sont","pour","dans","sur","qui","que","quoi","dont","où","avec","par","plus","moins","très","bien","cette","ces","leur","leurs","aux","du","au","il","elle","ils","elles","nous","vous","je","tu","ce","se","pas","ne","en","y","a","à","de"];

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--secondary)"; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = "var(--primary)"; });
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); const file = e.dataTransfer.files[0]; if(file && file.type === "application/pdf") processPDF(file); });
        fileInput.addEventListener('change', (e) => { const file = e.target.files[0]; if(file) processPDF(file); });

        async function processPDF(file) {
            dropZone.style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('pdf-viewer').src = URL.createObjectURL(file);

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                let fullText = "";
                const pagesToRead = Math.min(pdf.numPages, 5); 
                for (let i = 1; i <= pagesToRead; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    fullText += textContent.items.map(item => item.str).join(" ") + " ";
                }
                analyzeText(fullText);
                setTimeout(() => {
                    document.getElementById('upload-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('upload-screen').style.display = 'none';
                        document.getElementById('app-screen').style.display = 'flex';
                        initChart();
                    }, 500);
                }, 1000);
            } catch (error) { alert("Erreur de lecture du PDF."); location.reload(); }
        }

        function analyzeText(text) {
            const words = text.toLowerCase().replace(/[^a-záàâäéèêëíìîïóòôöúùûüç\s]/g, '').split(/\s+/);
            const wordCount = {};
            words.forEach(word => {
                if (word.length > 5 && !stopWords.includes(word)) { wordCount[word] = (wordCount[word] || 0) + 1; }
            });
            extractedKeywords = Object.keys(wordCount).sort((a, b) => wordCount[b] - wordCount[a]).slice(0, 6);
            renderPriorities();
        }

        function renderPriorities() {
            const list = document.getElementById('priority-list');
            list.innerHTML = '';
            extractedKeywords.forEach((keyword, index) => {
                const li = document.createElement('li');
                li.className = 'priority-item';
                li.id = `item-${index}`;
                li.innerHTML = `
                    <strong style="text-transform: capitalize; color: var(--primary);">${keyword}</strong>
                    <button class="btn-check" onclick="markAsLearned(${index})">Valider ✓</button>
                `;
                list.appendChild(li);
            });
        }

        function initChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            progressChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Maîtrisé', 'À voir'], datasets: [{ data: [0, 100], backgroundColor: ['#00f2fe', 'rgba(255,255,255,0.05)'], borderWidth: 0, cutout: '85%' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } } }
            });
        }

        function markAsLearned(index) {
            const item = document.getElementById(`item-${index}`);
            const btn = item.querySelector('.btn-check');
            
            item.classList.add('learned');
            btn.innerText = "Acquis 🌟";
            btn.style.background = "transparent";
            btn.style.color = "var(--success)";
            btn.disabled = true;

            const step = Math.ceil(100 / extractedKeywords.length);
            currentMastery += step;
            if(currentMastery > 99) currentMastery = 100;

            const scoreText = document.getElementById('mastery-score');
            scoreText.innerText = currentMastery + '%';
            
            progressChart.data.datasets[0].data = [currentMastery, 100 - currentMastery];
            if(currentMastery === 100) {
                progressChart.data.datasets[0].backgroundColor[0] = '#ff00e6';
                scoreText.style.color = 'var(--secondary)';
                triggerConfetti();
            }
            progressChart.update();
        }

        function triggerConfetti() {
            var duration = 3000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#00f2fe', '#ff00e6'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#00f2fe', '#ff00e6'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        /* --- LOGIQUE DU QUIZ --- */
        function openQuiz() {
            if (extractedKeywords.length === 0) return alert("Ajoute un PDF d'abord !");
            
            const randomConcept = extractedKeywords[Math.floor(Math.random() * extractedKeywords.length)];
            document.getElementById('quiz-question').innerHTML = `Que signifie le concept de <strong style="color:var(--primary); text-transform:uppercase;">${randomConcept}</strong> dans ce document ?`;
            
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = `
                <button class="quiz-btn" onclick="checkAnswer(this, true)">A) C'est un élément clé abordé dans le texte.</button>
                <button class="quiz-btn" onclick="checkAnswer(this, false)">B) C'est une notion totalement hors sujet.</button>
                <button class="quiz-btn" onclick="checkAnswer(this, false)">C) C'est une erreur de traduction de l'auteur.</button>
            `;
            
            document.getElementById('quiz-modal').style.display = 'flex';
        }

        function checkAnswer(btn, isCorrect) {
            const allBtns = document.querySelectorAll('.quiz-btn');
            allBtns.forEach(b => b.disabled = true); // Désactiver après un clic
            
            if(isCorrect) {
                btn.classList.add('correct');
                btn.innerHTML += " ✅";
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 } }); // Petit confetti pour une bonne réponse
            } else {
                btn.classList.add('wrong');
                btn.innerHTML += " ❌";
            }
        }

        function closeQuiz() {
            document.getElementById('quiz-modal').style.display = 'none';
        }
    </script>
</body>
</html>
